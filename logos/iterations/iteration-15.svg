<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
<defs>
  <filter id="sparkle-glow" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect width="1024" height="512" fill="#FFFFFF"/>
<g id="icon">
  <rect x="80" y="300" width="52" height="100" fill="#8B6914" rx="4"/>
  <rect x="152" y="240" width="52" height="160" fill="#C9A030" rx="4"/>
  <rect x="224" y="180" width="52" height="220" fill="#E8C84A" rx="4"/>
  <g transform="translate(250, 130)" filter="url(#sparkle-glow)">
    <polygon points="0,-36 6,-6 0,36 -6,-6" fill="#F5E070"/>
    <polygon points="-36,0 -6,6 36,0 -6,-6" fill="#F5E070"/>
    <g transform="rotate(45)">
      <polygon points="0,-22 4,-4 0,22 -4,-4" fill="#FFF8B0"/>
      <polygon points="-22,0 -4,4 22,0 -4,-4" fill="#FFF8B0"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="#FFFFFF"/>
  </g>
</g>
<g id="wordmark">
  <text y="364" font-family="Georgia, 'Times New Roman', serif" text-anchor="start">
    <tspan x="315" font-size="68" font-weight="700" fill="#8B6914">Idea</tspan><tspan font-size="96" font-weight="400" fill="#C9A030" dx="10">To</tspan><tspan font-size="132" font-weight="700" fill="#E8C84A" dx="14">Plan</tspan>
  </text>
  <line x1="315" y1="380" x2="875" y2="380" stroke="#C9A030" stroke-width="1.5"/>
</g>
<g id="tagline">
  <text x="317" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#8B6914" letter-spacing="3">Shape your future. Start today.</text>
</g>
</svg>
